services:
  wordpress:
    image: wordpress:latest
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
    env_file:
      - .env
    volumes:
      - ../data/wordpress:/var/www/html
      - ../../plugins/printforge:/var/www/html/wp-content/plugins/printforge
      - ../../plugins/printforge-configurator:/var/www/html/wp-content/plugins/printforge-configurator
    networks:
      - printforge

  db:
    image: mariadb:lts
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../data/mariadb:/var/lib/mysql
    networks:
      - printforge

networks:
  printforge:
    name: printforge
    external: true
