services:
  admin:
    image: node:lts
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../:/app
      - admin_node_modules:/app/node_modules
      - admin_workspace_node_modules:/app/apps/admin/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://fastify:3000
      VITE_BASE_PATH: /pf-admin/
    command: sh -c "npm install --include=optional && npm run dev --workspace=apps/admin -- --host 0.0.0.0"
    networks:
      - printforge

  configurator:
    image: node:lts
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ../../:/app
      - configurator_node_modules:/app/node_modules
      - configurator_workspace_node_modules:/app/apps/configurator/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://fastify:3000
      VITE_BASE_PATH: /pf/
    command: sh -c "npm install --include=optional && npm run dev --workspace=apps/configurator -- --host 0.0.0.0"
    networks:
      - printforge

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    networks:
      - printforge

volumes:
  fastify_node_modules:
  fastify_workspace_node_modules:
  admin_node_modules:
  admin_workspace_node_modules:
  configurator_node_modules:
  configurator_workspace_node_modules:

networks:
  printforge:
    external: true
