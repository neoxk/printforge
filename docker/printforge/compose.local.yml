services:
  fastify:
    image: node:lts
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - postgres
    volumes:
      - ../../:/app
      - fastify_node_modules:/app/node_modules
      - fastify_workspace_node_modules:/app/backend/node_modules
    env_file:
      - .env
    command: sh -c "npm install --include=optional && npm run db:generate --workspace=backend && npx prisma migrate deploy --schema backend/prisma/schema.prisma && npm run dev --workspace=backend"
    networks:
      - printforge

  admin:
    image: node:lts
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - fastify
    volumes:
      - ../../:/app
      - admin_node_modules:/app/node_modules
      - admin_workspace_node_modules:/app/apps/admin/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://fastify:3000
      VITE_BASE_PATH: /pf-admin/
      VITE_HMR_HOST: localhost
      VITE_HMR_CLIENT_PORT: 5174
      VITE_HMR_PATH: /pf-admin/@vite-hmr
    command: sh -c "npm install --include=optional && npm run dev --workspace=apps/admin -- --host 0.0.0.0"
    networks:
      - printforge

  configurator:
    image: node:lts
    restart: unless-stopped
    working_dir: /app
    depends_on:
      - fastify
    volumes:
      - ../../:/app
      - configurator_node_modules:/app/node_modules
      - configurator_workspace_node_modules:/app/apps/configurator/node_modules
    environment:
      VITE_API_PROXY_TARGET: http://fastify:3000
      VITE_BASE_PATH: /pf/
      VITE_HMR_HOST: localhost
      VITE_HMR_CLIENT_PORT: 5174
      VITE_HMR_PATH: /pf/@vite-hmr
    command: sh -c "npm install --include=optional && npm run dev --workspace=apps/configurator -- --host 0.0.0.0"
    networks:
      - printforge

  router:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - admin
      - configurator
      - fastify
    volumes:
      - ./caddy/Caddyfile.dev:/etc/caddy/Caddyfile:ro
    networks:
      - printforge
    ports:
      - "5174:5174"

  postgres:
    env_file:
      - .env
    ports:
      - "5432:5432"
